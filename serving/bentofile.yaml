service: "serving/bentoml_service.py:svc"
labels:
  project: pdi-delinquency-engine
  team: risk-analytics
include:
  - "ml/*.py"
  - "config/*.py"
  - "serving/*.py"
  - "models/*"
  - "requirements.txt"
  - ".env"
python:
  packages:
    - xgboost>=2.0.0
    - lightgbm>=4.0.0
    - torch>=2.0.0
    - scikit-learn>=1.3.0
    - numpy>=1.24.0
    - pandas>=2.0.0
    - shap>=0.42.0
    - lime>=0.2.0
    - joblib>=1.3.0
    - psycopg2-binary>=2.9.0
    - redis>=5.0.0
    - pydantic>=2.0.0
    - python-dotenv>=1.0.0
docker:
  python_version: "3.10"
  system_packages:
    - libpq-dev
