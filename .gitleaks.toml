title = "PDI Engine Secret Scanning Rules"

[extend]
useDefault = true

# ── Custom rules ──────────────────────────────

[[rules]]
id = "pdi-hardcoded-password"
description = "Hardcoded PDI default password"
regex = '''(?i)(password|passwd)\s*=\s*["']pdi_password["']'''
tags = ["password", "pdi"]

[[rules]]
id = "twilio-sid"
description = "Twilio Account SID"
regex = '''AC[a-f0-9]{32}'''
tags = ["twilio"]

[[rules]]
id = "twilio-auth-token"
description = "Twilio Auth Token"
regex = '''(?i)twilio[_\-]?auth[_\-]?token\s*[=:]\s*["']?[a-f0-9]{32}["']?'''
tags = ["twilio"]

[[rules]]
id = "groq-api-key"
description = "GROQ API Key"
regex = '''(?i)groq[_\-]?api[_\-]?key\s*[=:]\s*["']?gsk_[a-zA-Z0-9]{48,}["']?'''
tags = ["groq"]

[[rules]]
id = "airflow-secret-key"
description = "Airflow Secret Key"
regex = '''(?i)airflow[_\-]?secret[_\-]?key\s*[=:]\s*["'][^"']{8,}["']'''
tags = ["airflow"]

# NOTE: grafana-admin-password rule removed — docker-compose.yml uses
# ${ENV_VAR} references (not hardcoded secrets), and re2 engine does
# not support (?! lookahead) needed to distinguish them.

# ── Allowlist (false positive suppression) ────

[allowlist]
paths = [
    '''\.env\.example$''',
    '''.*\.md$''',
    '''tests?/fixtures/''',
    '''tests?/data/''',
    '''init_db.*\.sql$''',
    '''docker-compose\.yml$''',
]
