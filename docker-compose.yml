services:
  # ─────────────────────────────────────────────
  # Core Infrastructure
  # ─────────────────────────────────────────────
  pdi-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pdi-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - pdi-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  pdi-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pdi-kafka
    depends_on:
      pdi-zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: pdi-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://pdi-kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - pdi-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  pdi-postgres:
    image: postgres:16
    container_name: pdi-postgres
    environment:
      POSTGRES_USER: pdi_user
      POSTGRES_PASSWORD: pdi_password
      POSTGRES_DB: pdi_db
    ports:
      - "5432:5432"
    volumes:
      - pdi-postgres-data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=5
        -c max_replication_slots=5
    networks:
      - pdi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdi_user -d pdi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pdi-redis:
    image: redis:7-alpine
    container_name: pdi-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - pdi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # Stream Processing - Apache Flink
  # ─────────────────────────────────────────────
  pdi-flink-jobmanager:
    image: flink:1.18
    container_name: pdi-flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: pdi-flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    networks:
      - pdi-network

  pdi-flink-taskmanager:
    image: flink:1.18
    container_name: pdi-flink-taskmanager
    depends_on:
      - pdi-flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: pdi-flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1024m
    networks:
      - pdi-network

  # ─────────────────────────────────────────────
  # Batch Processing - Apache Spark
  # ─────────────────────────────────────────────
  pdi-spark-master:
    image: apache/spark:3.5.3
    container_name: pdi-spark-master
    ports:
      - "7077:7077"
      - "8082:8080"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MODE: master
    networks:
      - pdi-network

  pdi-spark-worker:
    image: apache/spark:3.5.3
    container_name: pdi-spark-worker
    depends_on:
      - pdi-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://pdi-spark-master:7077
    environment:
      SPARK_MODE: worker
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 2
    networks:
      - pdi-network

  # ─────────────────────────────────────────────
  # Debezium CDC (Change Data Capture)
  # ─────────────────────────────────────────────
  pdi-debezium:
    image: debezium/connect:2.5
    container_name: pdi-debezium
    depends_on:
      pdi-kafka:
        condition: service_healthy
      pdi-postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: pdi-kafka:9092
      GROUP_ID: pdi-debezium-connect
      CONFIG_STORAGE_TOPIC: pdi.debezium.configs
      OFFSET_STORAGE_TOPIC: pdi.debezium.offsets
      STATUS_STORAGE_TOPIC: pdi.debezium.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    networks:
      - pdi-network

  # ─────────────────────────────────────────────
  # MLflow Model Registry
  # ─────────────────────────────────────────────
  pdi-mlflow:
    image: python:3.10-slim
    container_name: pdi-mlflow
    ports:
      - "5000:5000"
    entrypoint: ["bash", "-c"]
    environment:
      MLFLOW_DB_URI: postgresql://pdi_user:pdi_password@pdi-postgres:5432/mlflow_db
    command:
      - |
        apt-get update && apt-get install -y --no-install-recommends libpq-dev gcc && \
        pip install mlflow==2.11.0 psycopg2-binary && \
        mlflow server --host 0.0.0.0 --port 5000 \
          --backend-store-uri $MLFLOW_DB_URI \
          --default-artifact-root /mlflow/artifacts
    depends_on:
      pdi-postgres:
        condition: service_healthy
    volumes:
      - pdi-mlflow-artifacts:/mlflow/artifacts
    networks:
      - pdi-network
    restart: on-failure

  # ─────────────────────────────────────────────
  # Grafana Monitoring
  # ─────────────────────────────────────────────
  pdi-grafana:
    image: grafana/grafana:10.3.1
    container_name: pdi-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: pdi_admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 5s
    volumes:
      - pdi-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      pdi-postgres:
        condition: service_healthy
    networks:
      - pdi-network

  # ─────────────────────────────────────────────
  # Apache Superset
  # ─────────────────────────────────────────────
  pdi-superset:
    image: apache/superset:3.1.0
    container_name: pdi-superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: pdi-superset-secret-key-change-in-production
      SUPERSET_LOAD_EXAMPLES: "no"
      DATABASE_DB: pdi_db
      DATABASE_HOST: pdi-postgres
      DATABASE_PASSWORD: pdi_password
      DATABASE_USER: pdi_user
      DATABASE_PORT: 5432
      REDIS_HOST: pdi-redis
      REDIS_PORT: 6379
    volumes:
      - ./monitoring/superset_config.py:/app/pythonpath/superset_config.py
      - pdi-superset-data:/app/superset_home
    depends_on:
      pdi-postgres:
        condition: service_healthy
      pdi-redis:
        condition: service_healthy
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname PDI --email admin@pdi.local --password admin 2>/dev/null;
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "
    networks:
      - pdi-network

  # ─────────────────────────────────────────────
  # ClickHouse — Analytical Data Warehouse (PDF requirement)
  # ─────────────────────────────────────────────
  pdi-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: pdi-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_DB: pdi_analytics
      CLICKHOUSE_USER: pdi_user
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_PASSWORD: pdi_password
    volumes:
      - pdi-clickhouse-data:/var/lib/clickhouse
    networks:
      - pdi-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Apache Cassandra — Risk Score Storage (PDF requirement)
  # ─────────────────────────────────────────────
  pdi-cassandra:
    image: cassandra:4.1
    container_name: pdi-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: pdi-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "128M"
    volumes:
      - pdi-cassandra-data:/var/lib/cassandra
    networks:
      - pdi-network
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "DESCRIBE KEYSPACES"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────
  # Prometheus — Metrics Collection (PDF requirement)
  # ─────────────────────────────────────────────
  pdi-prometheus:
    image: prom/prometheus:v2.49.1
    container_name: pdi-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pdi-prometheus-data:/prometheus
    networks:
      - pdi-network

  # ─────────────────────────────────────────────
  # Apache Airflow — Orchestration (PDF requirement)
  # ─────────────────────────────────────────────
  pdi-airflow:
    image: apache/airflow:2.9.1
    container_name: pdi-airflow
    depends_on:
      pdi-postgres:
        condition: service_healthy
      pdi-redis:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pdi_user:pdi_password@pdi-postgres:5432/pdi_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      AIRFLOW__WEBSERVER__SECRET_KEY: "pdi-airflow-secret"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      PYTHONPATH: /opt/airflow/dags:/app
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - pdi-airflow-logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname PDI --role Admin --email admin@pdi.local 2>/dev/null || true &&
        airflow scheduler &
        airflow webserver
      "
    networks:
      - pdi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # PDI Application — Scoring Service + Dashboard
  # ─────────────────────────────────────────────
  pdi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdi-app
    depends_on:
      pdi-postgres:
        condition: service_healthy
      pdi-redis:
        condition: service_healthy
      pdi-kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: pdi-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: pdi_user
      POSTGRES_PASSWORD: pdi_password
      POSTGRES_DB: pdi_db
      REDIS_HOST: pdi-redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: pdi-kafka:9092
      MLFLOW_TRACKING_URI: http://pdi-mlflow:5000
      CASSANDRA_HOST: pdi-cassandra
      CASSANDRA_PORT: "9042"
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      TEST_PHONE_TO: ${TEST_PHONE_TO}

    volumes:
      - ./models:/app/models
      - pdi-app-data:/app/data
    networks:
      - pdi-network
    restart: on-failure

  pdi-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdi-dashboard
    command: ["python", "main.py", "dashboard"]
    depends_on:
      pdi-postgres:
        condition: service_healthy
      pdi-redis:
        condition: service_healthy
    ports:
      - "8050:8050"
    environment:
      POSTGRES_HOST: pdi-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: pdi_user
      POSTGRES_PASSWORD: pdi_password
      POSTGRES_DB: pdi_db
      REDIS_HOST: pdi-redis
      REDIS_PORT: "6379"
      # Give it access to the API URL if it needs it
      API_URL: http://pdi-app:8000
    volumes:
      - ./models:/app/models
    networks:
      - pdi-network
    restart: on-failure

  # ─────────────────────────────────────────────
  # n8n Workflow Automation — Visual Demo & Event Triggering
  # ─────────────────────────────────────────────
  pdi-n8n:
    image: n8nio/n8n:latest
    container_name: pdi-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - pdi-n8n-data:/home/node/.n8n
    networks:
      - pdi-network
    restart: on-failure

volumes:
  pdi-postgres-data:
  pdi-mlflow-artifacts:
  pdi-grafana-data:
  pdi-superset-data:
  pdi-cassandra-data:
  pdi-prometheus-data:
  pdi-airflow-logs:
  pdi-app-data:
  pdi-clickhouse-data:
  pdi-n8n-data:

networks:
  pdi-network:
    driver: bridge
