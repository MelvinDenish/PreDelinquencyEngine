---
# External Secrets Operator: pulls secrets from Azure Key Vault into K8s Secrets
# Requires: external-secrets-operator installed + SecretStore configured
# This replaces committing secrets in K8s manifest files.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-key-vault-store
  namespace: pdi-engine
spec:
  provider:
    azurekv:
      authType: ManagedIdentity
      vaultUrl: "${AZURE_KEY_VAULT_URL}"  # set during AKS deployment

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pdi-engine-secrets
  namespace: pdi-engine
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-key-vault-store
    kind: SecretStore
  target:
    name: pdi-engine-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: pdi-postgres-password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: pdi-redis-password
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: pdi-jwt-secret-key
    - secretKey: PII_ENCRYPTION_KEY
      remoteRef:
        key: pdi-pii-encryption-key
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: pdi-twilio-auth-token
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: pdi-smtp-password
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: pdi-groq-api-key
    - secretKey: AIRFLOW_FERNET_KEY
      remoteRef:
        key: pdi-airflow-fernet-key
    - secretKey: AIRFLOW_WEBSERVER_SECRET_KEY
      remoteRef:
        key: pdi-airflow-webserver-secret-key
    - secretKey: SUPERSET_SECRET_KEY
      remoteRef:
        key: pdi-superset-secret-key
