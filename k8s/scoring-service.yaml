---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-service
  namespace: pdi-engine
  labels:
    app: scoring-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scoring-service
  template:
    metadata:
      labels:
        app: scoring-service
    spec:
      containers:
        - name: scoring-service
          image: pdi-engine:latest
          command: ["python", "main.py", "scoring-service"]
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: "pdi-postgres"
            - name: REDIS_HOST
              value: "pdi-redis"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "pdi-kafka:9092"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: pdi-scoring
  namespace: pdi-engine
spec:
  selector:
    app: scoring-service
  ports:
    - port: 8000
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scoring-hpa
  namespace: pdi-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scoring-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
