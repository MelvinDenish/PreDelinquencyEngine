name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: pdi-engine
  K8S_NAMESPACE: pdi-engine

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image name
        id: image
        run: |
          IMAGE=$(echo "${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          echo "full=${IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "base=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.image.outputs.full }} -t ${{ steps.image.outputs.base }}:latest .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.image.outputs.full }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Push Docker image
        run: |
          docker push ${{ steps.image.outputs.full }}
          docker push ${{ steps.image.outputs.base }}:latest

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml || kubectl create namespace ${{ env.K8S_NAMESPACE }} || true

      - name: Create init-db ConfigMap
        run: |
          kubectl create configmap init-db-sql \
            --from-file=init_db.sql \
            -n ${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy infrastructure
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/kafka.yaml
          echo "Waiting for infrastructure..."
          kubectl rollout status deployment/postgres -n ${{ env.K8S_NAMESPACE }} --timeout=300s || echo "WARN: postgres not ready yet (may already be running)"
          kubectl rollout status deployment/redis -n ${{ env.K8S_NAMESPACE }} --timeout=120s || echo "WARN: redis not ready yet (may already be running)"

      - name: Deploy application
        run: |
          IMAGE=$(echo "${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}" | tr '[:upper:]' '[:lower:]')

          # Replace image references in K8s manifests
          sed -i "s|pdiengineacr.azurecr.io/pdi-engine:latest|${IMAGE}|g" k8s/scoring-service.yaml
          sed -i "s|pdiengineacr.azurecr.io/pdi-engine:latest|${IMAGE}|g" k8s/dashboard.yaml
          sed -i "s|pdiengineacr.azurecr.io/pdi-engine:latest|${IMAGE}|g" k8s/celery-worker.yaml
          sed -i "s|pdi-engine:latest|${IMAGE}|g" k8s/scoring-service.yaml
          sed -i "s|pdi-engine:latest|${IMAGE}|g" k8s/dashboard.yaml
          sed -i "s|pdi-engine:latest|${IMAGE}|g" k8s/celery-worker.yaml

          echo "Deploying with image: ${IMAGE}"
          kubectl apply -f k8s/scoring-service.yaml
          kubectl apply -f k8s/dashboard.yaml
          kubectl apply -f k8s/celery-worker.yaml

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/scoring-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s || echo "WARN: scoring-service rollout timeout"
          kubectl rollout status deployment/pdi-dashboard -n ${{ env.K8S_NAMESPACE }} --timeout=180s || echo "WARN: dashboard rollout timeout"
          kubectl rollout status deployment/celery-worker -n ${{ env.K8S_NAMESPACE }} --timeout=180s || echo "WARN: celery-worker rollout timeout"

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          echo "=== Services ==="
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
          echo "=== Deployments ==="
          kubectl get deployments -n ${{ env.K8S_NAMESPACE }}

      - name: Run smoke tests
        run: |
          SCORING_URL=$(kubectl get svc pdi-scoring -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
          if [ -n "$SCORING_URL" ]; then
            curl -sf http://${SCORING_URL}:8000/health || echo "Health check pending..."
          else
            echo "LoadBalancer IP not yet assigned, skipping smoke test"
          fi
