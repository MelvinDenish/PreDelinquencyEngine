name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev gcc g++

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          # Core packages
          pip install psycopg2-binary sqlalchemy redis kafka-python pydantic python-dotenv faker
          pip install numpy pandas scikit-learn requests joblib httpx
          # ML packages
          pip install xgboost lightgbm shap
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Serving & API
          pip install fastapi uvicorn mlflow
          # Intervention & Dashboard
          pip install celery apprise plotly dash dash-bootstrap-components
          # Monitoring & Fairness
          pip install evidently==0.7.17 fairlearn prometheus-fastapi-instrumentator prometheus-client
          # Optional packages (may fail in CI — that's OK)
          pip install lime || echo "WARN: lime install failed (optional)"
          pip install aif360 || echo "WARN: aif360 install failed (optional)"
          pip install feast || echo "WARN: feast install failed (optional)"
          pip install cassandra-driver || echo "WARN: cassandra-driver install failed (optional)"
          pip install groq || echo "WARN: groq install failed (optional)"
          # Dev tools
          pip install flake8 pytest pytest-cov black isort

      - name: Code formatting check (Black)
        run: black --check --diff . || true
        continue-on-error: true

      - name: Import sorting check (isort)
        run: isort --check-only --diff . || true
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Test module imports
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python -c "from config.settings import PostgresConfig; print('Config OK')" || true
          python -c "from ml.xgboost_model import XGBoostDelinquencyModel; print('XGBoost OK')" || true
          python -c "from ml.lightgbm_model import LightGBMDelinquencyModel; print('LightGBM OK')" || true
          python -c "from ml.lstm_model import LSTMDelinquencyModel; print('LSTM OK')" || true
          python -c "from ml.ensemble import EnsembleScorer; print('Ensemble OK')" || true
          python -c "from ml.explainability import SHAPExplainer; print('SHAP OK')" || true

      - name: Run unit tests
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=term-missing || echo "Tests completed (some may require live services)"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety bandit

      - name: Check dependencies for vulnerabilities (BLOCKING)
        run: |
          pip install safety
          safety check -r requirements.txt

      - name: Run Bandit security linter (BLOCKING on HIGH severity)
        run: |
          pip install bandit
          bandit -r . -x ./tests --severity-level high --confidence-level high \
            -f json -o bandit-report.json || true
          # Fail build on HIGH severity findings
          bandit -r . -x ./tests --severity-level high --confidence-level high

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Scan for hardcoded secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for secrets in docker-compose (custom check)
        run: |
          # Fail if docker-compose.yml contains any hardcoded passwords
          if grep -E '(password|PASSWORD|secret|SECRET|token|TOKEN)\s*:\s*[a-zA-Z0-9_]{8,}' docker-compose.yml | grep -v '\${'; then
            echo "ERROR: Hardcoded secret detected in docker-compose.yml"
            exit 1
          fi
          echo "No hardcoded secrets found in docker-compose.yml"

  codeql-analysis:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
