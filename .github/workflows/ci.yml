name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  DOCKER_IMAGE: pdi-engine

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pdi_user
          POSTGRES_PASSWORD: pdi_password
          POSTGRES_DB: pdi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev gcc g++ default-jdk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          # Install packages in stages to handle build failures gracefully
          # Core packages (always succeed)
          pip install psycopg2-binary sqlalchemy redis kafka-python pydantic python-dotenv faker
          pip install numpy pandas scikit-learn requests joblib httpx
          # ML packages
          pip install xgboost lightgbm shap
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Serving & API
          pip install fastapi uvicorn mlflow bentoml
          # Intervention & Dashboard
          pip install celery apprise plotly dash dash-bootstrap-components
          # Monitoring & Fairness
          pip install evidently fairlearn prometheus-fastapi-instrumentator prometheus-client
          # Packages that need special handling (may fail in CI — that's OK, they run in Docker)
          pip install lime || echo "WARN: lime install failed (optional)"
          pip install aif360 || echo "WARN: aif360 install failed (optional)"
          pip install feast || echo "WARN: feast install failed (optional)"
          pip install cassandra-driver || echo "WARN: cassandra-driver install failed (runs in Docker)"
          pip install apache-flink || echo "WARN: apache-flink install failed (runs in Docker)"
          pip install apache-airflow || echo "WARN: apache-airflow install failed (runs in Docker)"
          # Dev tools
          pip install flake8 pytest pytest-cov black isort

      - name: Code formatting check (Black)
        run: black --check --diff . || true
        continue-on-error: true

      - name: Import sorting check (isort)
        run: isort --check-only --diff . || true
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Initialize database
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: pdi_user
          POSTGRES_PASSWORD: pdi_password
          POSTGRES_DB: pdi_db
        run: |
          PGPASSWORD=pdi_password psql -h localhost -U pdi_user -d pdi_db -f init_db.sql || echo "WARN: init_db.sql not found or failed"

      - name: Run unit tests
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing || true

      - name: Test module imports
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python -c "from config.settings import PostgresConfig; print('Config OK')"
          python -c "from ml.xgboost_model import XGBoostDelinquencyModel; print('XGBoost OK')"
          python -c "from ml.lightgbm_model import LightGBMDelinquencyModel; print('LightGBM OK')"
          python -c "from ml.lstm_model import LSTMDelinquencyModel; print('LSTM OK')"
          python -c "from ml.ensemble import EnsembleScorer; print('Ensemble OK')"
          python -c "from ml.explainability import SHAPExplainer; print('SHAP OK')"
          python -c "from scoring_service.app import app; print('Scoring Service OK')"
          python -c "from intervention.rules_engine import determine_intervention; print('Rules Engine OK')"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE }}:${{ github.sha }} python -c "print('Container runs OK')"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety bandit

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt || true

      - name: Run Bandit security linter
        run: bandit -r . -x ./tests --severity-level medium || true
