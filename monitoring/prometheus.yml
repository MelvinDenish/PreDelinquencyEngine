global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'pdi-monitor'

scrape_configs:
  # FastAPI Scoring Service — /metrics exposed via prometheus-fastapi-instrumentator
  - job_name: 'pdi-scoring-service'
    static_configs:
      - targets: ['pdi-app:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Kafka broker metrics (via JMX exporter if available)
  - job_name: 'pdi-kafka'
    static_configs:
      - targets: ['pdi-kafka:9092']
    scrape_interval: 30s

  # Redis exporter (embedded redis stats)
  - job_name: 'pdi-redis'
    static_configs:
      - targets: ['pdi-redis-exporter:9121']
    scrape_interval: 15s

  # PostgreSQL exporter
  - job_name: 'pdi-postgres'
    static_configs:
      - targets: ['pdi-postgres-exporter:9187']
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
